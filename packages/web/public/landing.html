<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunPilot - 学生个人远程开发测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0c0f1d 0%, #1a1f3a 50%, #0d1117 100%);
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1.25rem;
      color: #8b949e;
      margin-bottom: 3rem;
      letter-spacing: 0.1em;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff);
      margin: 0 auto 2rem;
      border-radius: 1px;
    }
    .info-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
    }
    .info-card p {
      color: #8b949e;
      line-height: 1.8;
      font-size: 1rem;
    }
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.5rem;
      text-align: center;
    }
    .beian {
      color: #484f58;
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .beian:hover {
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SunPilot 测试</h1>
    <p class="subtitle">学生个人远程开发测试使用</p>
    <div class="divider"></div>
    <div class="info-card">
      <p>本网站仅供学生个人学习与远程开发测试使用</p>
      <p>非商业运营项目 · 仅限测试环境</p>
    </div>
  </div>

  <footer>
    <a class="beian" href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">鲁ICP备2026034147号</a>
  </footer>
</body>
</html>
