services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sunpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sunpilot
      POSTGRES_PASSWORD: sunpilot_dev_password
      POSTGRES_DB: sunpilot
    ports:
      - "127.0.0.1:${SUNPILOT_POSTGRES_PORT:-5432}:5432"
    volumes:
      - sunpilot_pg_data:/var/lib/postgresql/data
    mem_limit: 1g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunpilot -d sunpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sunpilot_pg_data:
